<svg width="800" height="500" viewBox="0 70 800 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes movePath {
        0% { transform: translate(200px, 320px); opacity: 0; }
        5% { opacity: 1; }
        35% { transform: translate(400px, 220px); }
        65% { transform: translate(400px, 220px); } /* Pause pendant le traitement IA */
        95% { transform: translate(600px, 320px); opacity: 1; }
        100% { transform: translate(600px, 320px); opacity: 0; }
      }
      
      @keyframes processDot {
        0%, 35% { transform: scale(1); fill: #3B82F6; } /* Bleu : Fichiers bruts */
        50% { transform: scale(2.5); fill: #8B5CF6; } /* Violet : Traitement IA en cours */
        65%, 100% { transform: scale(1); fill: #10B981; } /* Vert : Résultat prêt */
      }

      @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-8px); }
      }

      .moving-group {
        animation: movePath 4s infinite ease-in-out;
      }
      .pulsing-dot {
        animation: processDot 4s infinite ease-in-out;
      }
      .floating {
        animation: float 4s infinite ease-in-out;
      }
    </style>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="15" stdDeviation="10" flood-opacity="0.1"/>
    </filter>

    <g id="iso-block">
      <path d="M 0 -30 L 60 0 L 0 30 L -60 0 Z" />
      <path d="M -60 0 L 0 30 L 0 60 L -60 30 Z" />
      <path d="M 0 30 L 60 0 L 60 30 L 0 60 Z" />
    </g>
  </defs>


  <path d="M 200 320 L 400 220 L 600 320" fill="none" stroke="#CBD5E1" stroke-width="3" stroke-dasharray="8,8" />

  <g transform="translate(200, 320)">
    <g filter="url(#shadow)">
      <path d="M 0 -30 L 60 0 L 0 30 L -60 0 Z" fill="#DBEAFE" />
      <path d="M -60 0 L 0 30 L 0 50 L -60 20 Z" fill="#93C5FD" />
      <path d="M 0 30 L 60 0 L 60 20 L 0 50 Z" fill="#60A5FA" />
    </g>
    
    <g class="floating" transform="translate(0, -45)">
      <rect x="-15" y="-20" width="20" height="25" rx="2" fill="#E2E8F0" transform="rotate(-15)" />
      <rect x="-5" y="-15" width="22" height="28" rx="2" fill="white" stroke="#3B82F6" stroke-width="2" />
      <line x1="0" y1="-5" x2="12" y2="-5" stroke="#3B82F6" stroke-width="2" stroke-linecap="round"/>
      <line x1="0" y1="2" x2="12" y2="2" stroke="#3B82F6" stroke-width="2" stroke-linecap="round"/>
      <line x1="0" y1="9" x2="8" y2="9" stroke="#3B82F6" stroke-width="2" stroke-linecap="round"/>
    </g>

    <text x="0" y="80" font-family="sans-serif" font-weight="bold" font-size="14" fill="#1E293B" text-anchor="middle">1. Documents</text>
    <text x="0" y="100" font-family="sans-serif" font-size="12" fill="#64748B" text-anchor="middle">PDF, Word, PPT</text>
  </g>

  <g transform="translate(400, 220)">
    <g filter="url(#shadow)">
      <path d="M 0 -30 L 70 0 L 0 35 L -70 0 Z" fill="#E0E7FF" />
      <path d="M -70 0 L 0 35 L 0 60 L -70 25 Z" fill="#A5B4FC" />
      <path d="M 0 35 L 70 0 L 70 25 L 0 60 Z" fill="#818CF8" />
    </g>

    <g class="floating" transform="translate(0, -45)" style="animation-delay: -1s;">
      <polygon points="0,-25 22,-12 22,12 0,25 -22,12 -22,-12" fill="white" stroke="#6366F1" stroke-width="3"/>
      <circle cx="-8" cy="-5" r="3" fill="#6366F1"/>
      <circle cx="8" cy="-5" r="3" fill="#6366F1"/>
      <circle cx="0" cy="8" r="3" fill="#6366F1"/>
      <line x1="-8" y1="-5" x2="8" y2="-5" stroke="#6366F1" stroke-width="2"/>
      <line x1="-8" y1="-5" x2="0" y2="8" stroke="#6366F1" stroke-width="2"/>
      <line x1="8" y1="-5" x2="0" y2="8" stroke="#6366F1" stroke-width="2"/>
    </g>

    <text x="0" y="90" font-family="sans-serif" font-weight="bold" font-size="16" fill="#1E293B" text-anchor="middle">2. WisePaper IA</text>
    <text x="0" y="110" font-family="sans-serif" font-size="12" fill="#64748B" text-anchor="middle">Analyse &amp; Structuration</text>
  </g>

  <g transform="translate(600, 320)">
    <g filter="url(#shadow)">
      <path d="M 0 -30 L 60 0 L 0 30 L -60 0 Z" fill="#D1FAE5" />
      <path d="M -60 0 L 0 30 L 0 50 L -60 20 Z" fill="#6EE7B7" />
      <path d="M 0 30 L 60 0 L 60 20 L 0 50 Z" fill="#34D399" />
    </g>

    <g class="floating" transform="translate(0, -45)" style="animation-delay: -2s;">
      <rect x="-18" y="-15" width="36" height="26" rx="3" fill="white" stroke="#10B981" stroke-width="2" />
      <path d="M -8 0 L -2 6 L 8 -6" fill="none" stroke="#10B981" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="12" cy="10" r="6" fill="#10B981"/>
      <path d="M 10 10 L 12 12 L 15 8" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
    </g>

    <text x="0" y="80" font-family="sans-serif" font-weight="bold" font-size="14" fill="#1E293B" text-anchor="middle">3. Formations</text>
    <text x="0" y="100" font-family="sans-serif" font-size="12" fill="#64748B" text-anchor="middle">Cours &amp; Quiz interactifs</text>
  </g>

  <g class="moving-group">
    <circle cx="0" cy="-10" r="5" class="pulsing-dot" filter="url(#glow)"/>
  </g>

</svg>